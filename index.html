<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/utility.css" />
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>Spotify - Web Player: Music for everyone </title>
</head>

<body>
  <!-- <img src="logo.svg" alt="spotify logo"> -->

  <div class="container flex bg-black">
    <div class="left">
      <div class="close invert">
        <img width="30px" src="img/close.svg" alt="Close" />
      </div>

      <div class="home bg-grey rounded m-1 p-1">
        <div class="log">
          <img class="invert" src="img/logo.svg" alt="Spotify Logo" />
        </div>
        <ul>
          <li><img class="invert" src="img/home.svg" alt="Home" />Home</li>
          <li><img class="invert" src="img/search.svg" alt="Search" />Search</li>
        </ul>
      </div>
      <div class="library bg-grey rounded m-1 p-1">
        <div class="heading">
          <img class="invert" src="img/playlist.svg" alt="Playlist" />

          <h4>Your Library</h4>
        </div>
        <div class="songList">
          <ul>

          </ul>
        </div>

        <div class="footer">
          <div>
            <a href="https://www.spotify.com/jp/legal/"><span>Legal</span></a>
          </div>
          <div>
            <a href="https://www.spotify.com/jp/privacy/"><span>Privacy Center</span></a>
          </div>
          <div>
            <a href="https://www.spotify.com/jp/legal/privacy-policy/"><span>Privacy Policy</span></a>
          </div>
          <div>
            <a href="https://www.spotify.com/jp/legal/cookies-policy/"><span>Cookies</span></a>
          </div>
          <div>
            <a href="https://www.spotify.com/jp/legal/privacy-policy/#s3"><span>About Ads</span></a>
          </div>
          <div>
            <a href="https://www.spotify.com/jp/accessibility/"><span>Accessibility</span></a>
          </div>
        </div>
      </div>
    </div>
    <div class="right border bg-grey rounded">
      <div class="header">


        <div class="nav">
          <img class="invert hameBurger" src="img/hameburger.svg" alt="Menu" />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="currentColor"
            fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 6C15 6 9.00001 10.4189 9 12C8.99999 13.5812 15 18 15 18"></path>
          </svg>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="currentColor"
            fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18"></path>
          </svg>
        </div>
        <div id= "btn" class="buttons">
          <button class="signupbtn">Sign up</button>
          <button class="loginbtn">Log in</button>
        </div>
      </div>
      <div class="spotifyPlaylist p-1">
        <h1>Spotify Playlists</h1>
        <div class="cardContainer">


        </div>

        <div class="playBar">


          <div class="seekBar">
            <div class="circle">

            </div>

          </div>
          <div class="aboveBar">

            <div class="songInfo"></div>

            <div class="songButton">

              <img id="previous" class="invert opacity-70" src="img/previous.svg" alt="Previous Song" />
              <img id="play" src="img/playsong.svg" alt="Play Song" />
              <img id="next" class="invert opacity-70" src="img/nextsong.svg" alt="Next Song" />
            </div>

            <div class="songTimeVolume">
              <div class="songTime">

              </div>
              <div class="volume">
                <img class="invert" src="img/volume.svg" alt="Volume" />
                <div class="range">
                  <input type="range" id="volumeBar" min="0" max="100" value="50">

                </div>
              </div>

            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>

</html>
