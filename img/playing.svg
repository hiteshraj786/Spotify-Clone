<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <style>
    .bar { fill: #1DB954; transform-origin: bottom; }
    @keyframes bar1 { 0%,100%{transform:scaleY(0.3)} 50%{transform:scaleY(1)} }
    @keyframes bar2 { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(0.3)} }
    @keyframes bar3 { 0%,100%{transform:scaleY(0.5)} 50%{transform:scaleY(0.8)} }
    .b1 { animation: bar1 0.8s ease-in-out infinite; }
    .b2 { animation: bar2 0.8s ease-in-out infinite 0.2s; }
    .b3 { animation: bar3 0.8s ease-in-out infinite 0.4s; }
  </style>
  <rect class="bar b1" x="3"  y="4" width="4" height="16" rx="1"/>
  <rect class="bar b2" x="10" y="4" width="4" height="16" rx="1"/>
  <rect class="bar b3" x="17" y="4" width="4" height="16" rx="1"/>
</svg>